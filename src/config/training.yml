train:
  backbone_name: "efficientnet_b0"
  lr: 0.0001

  batch_size_train: 128
  batch_size_val: 64

  max_epochs: 18
  patience: 5

  seed: 42
  val_split: 0.1

  accelerator: "gpu"
  devices: 1
  precision: "32"

  num_workers: 0

  checkpoint_path: null
  checkpoint_dir: "./checkpoints"

  max_samples: 100

  mel_dim:
    sr: 32000
    n_mels: 128
    hop_length: 512
    n_fft: 2048
    freq_min: 20
    freq_max: 8000.0
    db_delta: 80
