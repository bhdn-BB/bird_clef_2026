train:
  backbone_name: "efficientnet_b0"
  lr: 0.0001

  batch_size_train: 128
  batch_size_val: 64

  max_epochs: 30
  patience: 5

  seed: 42
  val_split: 0.1

  accelerator: "gpu"
  devices: 1
  precision: "16-mixed"

  num_workers: 0

  checkpoint_path: best_model.ckpt

  mel_dim:
    sr: 32000
    n_mels: 128
    hop_length: 512
    n_fft: 1024
    freq_min: 0.0
    freq_max: 8000.0
    db_delta: 80