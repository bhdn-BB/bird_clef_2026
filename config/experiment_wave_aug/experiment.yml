name: "wave_aug"

backbone_name: "efficientnet_b0"
lr: 0.0001

batch_size_train: 128
batch_size_val: 64

max_epochs: 18
patience: 5

checkpoint_dir: "./checkpoints"

augs:
  wave_augmentation:
    gaussian_noise:
      min_amplitude: 0.001
      max_amplitude: 0.015
      p: 0.3

    pitch_shift:
      min_semitones: -2.0
      max_semitones: 2.0
      p: 0.3

    time_stretch:
      min_rate: 0.9
      max_rate: 1.1
      p: 0.2

